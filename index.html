<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dc Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:               #f0f0f0;
    --fg:               #000;
    --ins-bg:           #c8c8c8;
    --ins-fg:           #000;
    --func-bg:          #ffffff;
    --func-fg:          #000;
    --btn-border:       #555;
    --panel-bg:         #fff;
    --hdr-bg:           #333;
    --hdr-fg:           #fff;
    --tbl-border:       #bbb;
    --tbl-hdr-bg:       #ddd;
    --primary:          #226;
    --display-bg:       #f8f8f8;
    --display-fg:       #000000;
    --input-bg:         #ffffff;
    --input-fg:         #000000;
    --shift-on-bg:      #444;
    --shift-on-fg:      #fff;
    --popup-bg:         #eee;
    --popup-border:     #333;
    --btn-bg:           var(--ins-bg);
    --btn-fg:           var(--ins-fg);

    /* Adjustable typography: tweak these to change button text size/weight everywhere */
    --btn-font-size:    17px;
    --btn-font-weight:  700;
    --base-font-size:   16px;
    --input-font-size:  16px;
    --display-font-size: 16px;
  }

  [data-theme="dark"] {
    --bg:               #1a1a1a;
    --fg:               #e8e8e8;
    --ins-bg:           #3a3a3a;
    --ins-fg:           #e8e8e8;
    --func-bg:          #242424;
    --func-fg:          #e8e8e8;
    --btn-border:       #555;
    --panel-bg:         #242424;
    --hdr-bg:           #111;
    --hdr-fg:           #ccc;
    --tbl-border:       #444;
    --tbl-hdr-bg:       #2f2f2f;
    --primary:          #88aaff;
    --display-bg:       #242424;
    --display-fg:       #00ff88;
    --input-bg:         #1e2a1e;
    --input-fg:         #00ff88;
    --shift-on-bg:      #666;
    --shift-on-fg:      #fff;
    --popup-bg:         #2a2a2a;
    --popup-border:     #666;
    --btn-bg:           var(--ins-bg);
    --btn-fg:           var(--ins-fg);
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: system-ui, sans-serif;
    font-size: var(--base-font-size);
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0; margin: 0;
  }

  #app {
    width: 100%; max-width: 480px;
    height: 100vh;
    overflow: hidden;
    padding: 16px; box-sizing: border-box;
    display: flex; flex-direction: column;
  }

  .io-wrap { border: 2px solid black; background: var(--panel-bg); margin: 10px 0; flex-shrink: 0; }

  .stack-line {
    display: flex; align-items: center;
    height: 1.7em; padding: 0 8px;
    border-bottom: 1px solid var(--btn-border);
    background: var(--display-bg); color: var(--display-fg);
    font-family: monospace; font-size: var(--display-font-size);
    font-weight: 600;
  }
  .stack-line:last-child { border-bottom: none; }
  .stack-lbl { width: 1.4em; flex-shrink: 0; font-weight: bold; color: var(--primary); }
  .stack-val { flex: 1; overflow-x: auto; white-space: nowrap; }
  .stack-line-x {
    border-top: 2px solid black;
    background: var(--input-bg); color: var(--input-fg);
    padding: 0;
  }
  .stack-line-x .stack-lbl { padding-left: 8px; }
  .stack-line-x input {
    flex: 1; height: 100%;
    border: none; outline: none;
    background: transparent; color: inherit;
    font-family: monospace; font-size: var(--input-font-size); font-weight: 600;
    padding: 0 8px;
  }

  button {
    height: 44px;
    border: 2px solid var(--btn-border);
    border-radius: 6px;
    cursor: pointer;
    font-size: var(--btn-font-size);
    font-weight: var(--btn-font-weight);
    display: flex; justify-content: center; align-items: center;
    overflow: hidden; white-space: nowrap;
    width: 100%; padding: 0 4px;
    position: relative;
    user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;    
    background-image: linear-gradient(to bottom, rgba(255,255,255,0.55), rgba(255,255,255,0) 45%, rgba(0,0,0,0.06) 100%);
    box-shadow:
      0 2px 0 rgba(0,0,0,0.35),
      0 3px 4px rgba(0,0,0,0.28),
      inset 0 1px 0 rgba(255,255,255,0.5);
    transform: translateY(0);
    transition: transform 0.06s ease, box-shadow 0.06s ease;
    touch-action: manipulation;
  }
  button:active {
    transform: translateY(2px);
    box-shadow:
      0 0 0 rgba(0,0,0,0.35),
      0 1px 1px rgba(0,0,0,0.25),
      inset 0 1px 2px rgba(0,0,0,0.25);
    background-image: linear-gradient(to bottom, rgba(0,0,0,0.06), rgba(255,255,255,0) 55%, rgba(255,255,255,0.18) 100%);
  }
  button.ins  { background-color: var(--ins-bg);  color: var(--ins-fg); }
  button.func { background-color: var(--func-bg); color: var(--func-fg); }
  button.util { background-color: var(--func-bg); color: var(--fg); }
  button.shift-on {
    background-color: var(--shift-on-bg); color: var(--shift-on-fg); font-weight: bold;
    box-shadow:
      0 1px 1px rgba(0,0,0,0.25),
      inset 0 1px 3px rgba(0,0,0,0.45);
    transform: translateY(1px);
  }
  button.sym-fix { -webkit-text-stroke: 1.2px currentColor; }

  .toolbar {
    display: grid; grid-template-columns: repeat(6, minmax(50px, 1fr));
    gap: 10px 4px; align-items: center;
    width: 100%; margin-bottom: 10px; height: 44px;
    flex-shrink: 0;
  }
  .tb-left  { display: contents; }
  .tb-right { grid-column: span 3; font-size: 1em; display: flex; justify-content: flex-end; gap: 10px; align-items: center; }
  .theme-btn {
    background-color: var(--func-bg); border: 2px solid var(--btn-border); color: var(--fg);
    width: 28px; height: 24px; cursor: pointer; font-size: 14px;
    display: flex; justify-content: center; align-items: center;
    border-radius: 6px; padding: 0; flex-shrink: 0;
    background-image: linear-gradient(to bottom, rgba(255,255,255,0.55), rgba(255,255,255,0) 45%, rgba(0,0,0,0.06) 100%);
    box-shadow:
      0 1px 0 rgba(0,0,0,0.35),
      0 2px 3px rgba(0,0,0,0.25),
      inset 0 1px 0 rgba(255,255,255,0.5);
  }
  .theme-btn:hover { background-color: var(--tbl-hdr-bg); }
  .theme-btn:active {
    transform: translateY(1px);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
  }

  .grid6 {
    display: grid;
    grid-template-columns: repeat(6, minmax(50px, 1fr));
    gap: 10px 4px; width: 100%; grid-auto-rows: 44px;
    flex-shrink: 0;
  }
  .grid5 {
    display: grid;
    grid-template-columns: repeat(5, minmax(50px, 1fr));
    gap: 10px 4px; width: 100%; grid-auto-rows: 44px;
    margin-top: 10px;
    flex-shrink: 0;
  }
  .span2 { grid-column: span 2; }

  .pop-wrap { position: relative; display: inline-block; width: 100%; }

  .pop-menu {
    display: none; position: absolute;
    left: 0; width: 100%; min-width: 140px;
    padding: 0; border: 2px solid var(--popup-border);
    z-index: 1000; background: var(--popup-bg); color: var(--fg);
    max-height: min(260px, 80vh); overflow-y: auto; overflow-x: hidden;
    flex-direction: column;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.35);
  }
  .pop-menu[data-dir="above"] { bottom: 100%; top: auto;  margin-bottom: 4px; margin-top: 0; }
  .pop-menu[data-dir="below"] { top: 100%;   bottom: auto; margin-top: 4px;   margin-bottom: 0; }
  .pop-menu.open { display: flex; }
  .pop-menu button {
    height: 44px; min-height: 44px; flex-shrink: 0;
    width: 100%; margin: 0; padding: 0 8px;
    border: none; border-bottom: 1px solid var(--tbl-border);
    border-radius: 0;
    background: var(--popup-bg); color: var(--fg);
    font-size: var(--btn-font-size);
    font-weight: var(--btn-font-weight);
    display: flex; justify-content: center; align-items: center;
    cursor: pointer; white-space: nowrap; overflow: hidden;
    box-shadow: none;
    background-image: none;
  }
  .pop-menu button:last-child { border-bottom: none; }
  .pop-menu button:hover { background: var(--tbl-hdr-bg); }
  .pop-menu button:active { transform: none; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15); }
  button.pop-trigger { text-decoration: underline; }

  #detail {
    display: none;
    grid-template-columns: 32% 68%;
    column-gap: 6px; width: 100%;
    margin-top: 12px; padding-top: 10px;
    border-top: 2px solid var(--btn-border);
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
  }
  #detail.on { display: grid; }
  #detail > div {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
  }

  table {
    width: 100%; table-layout: fixed;
    border: 1px solid var(--tbl-border); border-collapse: collapse;
    font-size: 0.95rem; line-height: 1.3;
    background: var(--panel-bg); color: var(--fg);
  }
  caption {
    caption-side: top; text-align: center; padding: 5px;
    background: var(--hdr-bg); color: var(--hdr-fg);
    font-size: 1em; font-weight: bold;
    border: 1px solid #444; border-bottom: none; letter-spacing: 1px;
    position: sticky; top: 0; z-index: 1;
  }
  th { background: var(--tbl-hdr-bg); height: 25px; padding: 4px 5px; text-align: left; border-bottom: 1px solid var(--tbl-border); }
  td { padding: 4px 5px; border-bottom: 1px solid var(--tbl-border); vertical-align: top; word-wrap: break-word; overflow-wrap: break-word; }
  .mono { font-family: monospace; word-break: break-all; }
  .lx-row { background: rgba(0,0,0,.03); border-top: 2px solid var(--tbl-border); }
  .lx-lbl { font-weight: bold; color: var(--primary); }
  .fv     { font-weight: bold; color: var(--primary); }
  .ae     { background: rgba(0,0,0,.05); padding: 0 3px; border-radius: 3px; margin-right: 2px; display: inline; font-size: .9em; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  PWA Setup (Single File Implementation)
// ═══════════════════════════════════════════════════════════════════════
(function initPWA() {
  const manifest = {
    name: "dc Calculator",
    short_name: "dcCalc",
    start_url: window.location.href.split('?')[0],
    display: "standalone",
    background_color: "#f0f0f0",
    theme_color: "#333333",
    icons: [{
      src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzMzMyIvPjx0ZXh0IHg9IjUwIiB5PSI2MCIgZm9udC1zaXplPSI0MCIgZmlsbD0iI2ZmZiIgdGV4dC1hbmNob3I9Im1pZGRsZSI+ZGM8L3RleHQ+PC9zdmc+",
      sizes: "512x512",
      type: "image/svg+xml"
    }]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const manifestUrl = URL.createObjectURL(manifestBlob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = manifestUrl;
  document.head.appendChild(link);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.error('PWA SW failed:', err));
    });
  }
  
})();

// ═══════════════════════════════════════════════════════════════════════
//  DCMath  (version 28 — inlined)
// ═══════════════════════════════════════════════════════════════════════
class DCMath {
  constructor(input, scale = 0) {
    this.digits = []; this.scale = 0; this.sign = 1;
    if (input instanceof DCMath) { this.digits = [...input.digits]; this.scale = input.scale; this.sign = input.sign; return; }
    if (typeof input === "number") {
      this._parseString(input.toString());
      if (scale > this.scale) { this.digits = DCMath._mulMag(this.digits, DCMath._pow10(scale - this.scale)); this.scale = scale; }
      return;
    }
    if (typeof input === "string") this._parseString(input.trim());
  }
  _parseString(str) {
    if (!str) return;
    let neg = false;
    if (str.startsWith("_") || str.startsWith("-")) { neg = true; str = str.slice(1); }
    const dotPos = str.indexOf(".");
    const intStr = dotPos === -1 ? str : str.slice(0, dotPos);
    const fracStr = dotPos === -1 ? "" : str.slice(dotPos + 1);
    this.scale = fracStr.length;
    const combined = (intStr + fracStr).replace(/^0+/, "") || "0";
    if (combined === "0") return;
    this.sign = neg ? -1 : 1;
    this.digits = [];
    for (let i = combined.length; i > 0; i -= 2) this.digits.push(parseInt(combined.substring(Math.max(0, i - 2), i), 10));
    this._trimLeadingZeros();
  }
  isZero()     { return this.digits.length === 0; }
  isNegative() { return this.sign === -1 && !this.isZero(); }
  isPositive() { return this.sign === 1  && !this.isZero(); }
  abs()     { const r = new DCMath(this); r.sign = 1;          return r; }
  negate()  { if (this.isZero()) return new DCMath(this); const r = new DCMath(this); r.sign = -this.sign; return r; }
  compareTo(other) {
    let a, b;
    if (this.scale === other.scale) { a = this; b = other; } else [a, b] = DCMath._alignScales(this, other);
    if (a.isZero() && b.isZero()) return 0;
    if (a.sign !== b.sign) return a.sign > b.sign ? 1 : -1;
    const cmp = DCMath._cmpMag(a.digits, b.digits);
    return a.sign === 1 ? cmp : -cmp;
  }
  equals(other) { return this.compareTo(other) === 0; }
  stripScale() {
    if (this.scale === 0) return new DCMath(this);
    const { q } = DCMath._divmodMag(this.digits, DCMath._pow10(this.scale), 0);
    const res = new DCMath(0); res.digits = q; res.scale = 0; res.sign = q.length ? this.sign : 1;
    return res;
  }
  toString() {
    if (this.isZero()) return this.scale === 0 ? "0" : "." + "0".repeat(this.scale);
    let s = this.digits.slice().reverse().map((d, i) => i === 0 ? d.toString() : d.toString().padStart(2, "0")).join("");
    if (this.scale > 0) {
      while (s.length <= this.scale) s = "0" + s;
      const ip = s.slice(0, s.length - this.scale), fp = s.slice(s.length - this.scale);
      s = (ip === "0" ? "" : ip) + "." + fp;
    } else { s = s || "0"; }
    return this.sign === -1 ? "-" + s : s;
  }
  _trimLeadingZeros() { while (this.digits.length > 0 && this.digits[this.digits.length - 1] === 0) this.digits.pop(); }
  static _alignScales(a, b) {
    const t = Math.max(a.scale, b.scale);
    const aS = new DCMath(a); if (t > a.scale) { aS.digits = DCMath._mulMag(aS.digits, DCMath._pow10(t - a.scale)); aS.scale = t; }
    const bS = new DCMath(b); if (t > b.scale) { bS.digits = DCMath._mulMag(bS.digits, DCMath._pow10(t - b.scale)); bS.scale = t; }
    return [aS, bS];
  }
  static _pow10(n) {
    if (!DCMath._pow10Cache) DCMath._pow10Cache = new Map([[0, Object.freeze([1])]]);
    if (DCMath._pow10Cache.has(n)) return DCMath._pow10Cache.get(n);
    let best = 0;
    if (DCMath._pow10Cache.has(n - 1)) best = n - 1;
    else for (const k of DCMath._pow10Cache.keys()) if (k < n && k > best) best = k;
    let result = [...DCMath._pow10Cache.get(best)];
    for (let i = best; i < n; i++) result = DCMath._mulMagByDigit(result, 10);
    const fr = Object.freeze(result); DCMath._pow10Cache.set(n, fr); return fr;
  }
  static _mulMagByDigit(a, d) {
    if (!a.length || d === 0) return [];
    const r = []; let c = 0;
    for (let i = 0; i < a.length; i++) { const v = a[i] * d + c; r.push(v % 100); c = Math.trunc(v / 100); }
    while (c > 0) { r.push(c % 100); c = Math.trunc(c / 100); }
    return r;
  }
  static _addMag(a, b) {
    const len = Math.max(a.length, b.length); const r = []; let c = 0;
    for (let i = 0; i < len; i++) { const v = (a[i]||0) + (b[i]||0) + c; r.push(v % 100); c = Math.trunc(v / 100); }
    if (c) r.push(c); return r;
  }
  static _subMag(a, b) {
    const r = []; let bw = 0;
    for (let i = 0; i < a.length; i++) { let v = (a[i]||0) - (b[i]||0) - bw; if (v < 0) { v += 100; bw = 1; } else bw = 0; r.push(v); }
    while (r.length > 0 && r[r.length-1] === 0) r.pop(); return r;
  }
  static _mulMag(a, b) {
    if (!a.length || !b.length) return [];
    const r = new Array(a.length + b.length).fill(0);
    for (let i = 0; i < a.length; i++) for (let j = 0; j < b.length; j++) r[i+j] += a[i]*b[j];
    let c = 0;
    for (let i = 0; i < r.length; i++) { const v = r[i]+c; r[i] = v%100; c = Math.trunc(v/100); }
    while (c > 0) { r.push(c%100); c = Math.trunc(c/100); }
    while (r.length > 0 && r[r.length-1] === 0) r.pop(); return r;
  }
  static _cmpMag(a, b) {
    let al = a.length; while (al > 0 && a[al-1] === 0) al--;
    let bl = b.length; while (bl > 0 && b[bl-1] === 0) bl--;
    if (al !== bl) return al < bl ? -1 : 1;
    for (let i = al-1; i >= 0; i--) if (a[i] !== b[i]) return a[i] < b[i] ? -1 : 1;
    return 0;
  }
  static _divmodMag(dividend, divisor, extraScale = 0) {
    if (!divisor.length || (divisor.length === 1 && divisor[0] === 0)) throw new Error("divide by zero");
    let dvd = extraScale > 0 ? DCMath._mulMag(dividend, DCMath._pow10(extraScale)) : [...dividend];
    const dvs = [...divisor];
    while (dvd.length > 0 && dvd[dvd.length-1] === 0) dvd.pop();
    while (dvs.length > 0 && dvs[dvs.length-1] === 0) dvs.pop();
    if (!dvd.length) return { q: [], r: [] };
    const q = []; let rem = [];
    for (let i = dvd.length-1; i >= 0; i--) {
      rem.unshift(dvd[i]); while (rem.length > 0 && rem[rem.length-1] === 0) rem.pop();
      let lo = 0, hi = 99, qd = 0, lp = [];
      while (lo <= hi) { const m = Math.trunc((lo+hi)/2); const p = DCMath._mulMagByDigit(dvs,m); if (DCMath._cmpMag(p,rem)<=0){qd=m;lp=p;lo=m+1;}else hi=m-1; }
      q.push(qd); if (qd > 0) rem = DCMath._subMag(rem, lp);
    }
    q.reverse();
    while (q.length > 0 && q[q.length-1] === 0) q.pop();
    while (rem.length > 0 && rem[rem.length-1] === 0) rem.pop();
    return { q, r: rem };
  }
  static _intSqrt(n) { if (n < 2) return Math.trunc(n); let x = n, y = Math.trunc((x + Math.trunc(n/x))/2); while (y < x) { x = y; y = Math.trunc((x + Math.trunc(n/x))/2); } return x; }
  add(other) {
    const [a, b] = DCMath._alignScales(this, other); const r = new DCMath(0); r.scale = a.scale;
    if (a.sign === b.sign) { r.digits = DCMath._addMag(a.digits, b.digits); r.sign = (a.isZero()&&b.isZero())?1:a.sign; }
    else { const c = DCMath._cmpMag(a.digits, b.digits); if (c===0) return r; if (c>0){r.digits=DCMath._subMag(a.digits,b.digits);r.sign=a.sign;}else{r.digits=DCMath._subMag(b.digits,a.digits);r.sign=b.sign;} }
    return r;
  }
  sub(other)  { return this.add(other.negate()); }
  mul(other, k = 0) {
    if (this.isZero() || other.isZero()) return new DCMath(0);
    const rs = this.scale + other.scale, ts = Math.min(rs, Math.max(k, this.scale, other.scale)), drop = rs - ts;
    let pm = DCMath._mulMag(this.digits, other.digits);
    if (drop > 0) pm = DCMath._divmodMag(pm, DCMath._pow10(drop), 0).q;
    const r = new DCMath(0); r.digits = pm; r.scale = ts; r.sign = this.sign===other.sign?1:-1; r._trimLeadingZeros(); if(r.isZero())r.sign=1; return r;
  }
  div(other, k) {
    if (other.isZero()) throw new Error("divide by zero");
    if (k === undefined) k = Math.max(this.scale, other.scale);
    if (this.isZero()) { const r = new DCMath(0); r.scale = k; return r; }
    const power = other.scale + k - this.scale;
    let qm; if (power >= 0) { qm = DCMath._divmodMag(this.digits, other.digits, power).q; } else { const sd = DCMath._mulMag(other.digits, DCMath._pow10(-power)); qm = DCMath._divmodMag(this.digits, sd, 0).q; }
    const r = new DCMath(0); r.digits = qm; r.scale = k; r.sign = this.sign===other.sign?1:-1; r._trimLeadingZeros(); if(r.isZero())r.sign=1; return r;
  }
  divmod(other, k) {
    if (other.isZero()) throw new Error("divide by zero");
    if (k === undefined) k = Math.max(this.scale, other.scale);
    const q = this.div(other, k), p = q.mul(other, q.scale + other.scale); return [q, this.sub(p)];
  }

    const saved = localStorage.getItem("dc-theme");

    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  }

    const next = isDark() ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("dc-theme", next);

      state.dcState = s;

    const prefix = state.pendingReplace ? "R " : "";
    return prefix + raw.trim() + " p 0s=";
  }

  function wrapBtnMacro(cmd, print) {
    const cur    = state.input.trim();
    const spacer = cur ? " " : "";
    const suffix = (print !== false) ? " p" : "";
    const prefix = state.pendingReplace ? "R " : "";
    return prefix + cur + spacer + cmd + suffix + " 1s=";
  }

  function doEnter() {
    const wrapped = wrapRunDc(state.input);
    if (wrapped) { runDC(wrapped); state.pendingReplace = false; state.input = stackAt(0); state.sl = true; refreshAfterCalc(); }
  }

  function liftForNewEntry() {
    if (!state.sl) return;
    if (Array.isArray(state.dcState.stack) && state.dcState.stack.length > 0) {
      const top = state.dcState.stack[state.dcState.stack.length - 1];
      state.dcState.stack.push(top);
      if (state.dcState.stack.length > 4) state.dcState.stack = state.dcState.stack.slice(-4);
      state.pendingReplace = true;
      persistState({ dcState: state.dcState, lastx: state.lastx, output: state.output });
    }
    state.input = ""; state.sl = false;
  }

  function doIns(char) {
    liftForNewEntry();
    state.input += char;
    refreshIO();
    refreshStackLines();
  }

  function doMacro(cmd, print) {
    captureLastX();
    runDC(wrapBtnMacro(cmd, print));
    state.pendingReplace = false;
    state.input = stackAt(0); state.sl = true; refreshAfterCalc();
  }

  function doFunc(cmd, print) {
    captureLastX();
    runDC(wrapBtnMacro(cmd, print));
    state.pendingReplace = false;
    state.input = stackAt(0); state.sl = true; refreshAfterCalc();
  }

  function captureLastX() {
    const cur = state.input.trim();
    if (cur) { state.lastx = cur; }
    else {
      const stk = state.dcState.stack || [];
      state.lastx = stk.length ? String(stk[stk.length - 1]) : "0";
    }
    persistState({ dcState: state.dcState, lastx: state.lastx, output: state.output });
  }

  // ── Popup management ─────────────────────────────────────────────────
  function togglePopup(id, triggerEl) {
    if (state.openPopup === id) {
      state.openPopup = null;
    } else {
      state.openPopup = id;
      if (triggerEl) {
        const rect = triggerEl.getBoundingClientRect();
        const itemCount = {conv: 10, more: 8, stat: 12, clear: 3}[id] ?? 6;
        const estimatedH = itemCount * 44 + 8;
        state.popupDir = rect.top >= estimatedH ? "above" : "below";
      } else {
        state.popupDir = "below";
      }
    }
    render();
  }
  function closePopup() { if (state.openPopup) { state.openPopup = null; render(); } }

  document.addEventListener("click", e => {
    if (state.openPopup && !e.target.closest(".pop-wrap")) closePopup();
  });

  for (const evt of ["copy", "cut", "paste"]) {
    document.addEventListener(evt, e => {
      if (e.target.closest("button")) e.preventDefault();
    });
  }

  // ── dc state accessors ────────────────────────────────────────────────
  function cfg(key) { return state.dcState.config?.[key] ?? ""; }
  function stackLen()      { return (state.dcState.stack || []).length; }
  function stackAt(offset) { const s = state.dcState.stack || []; const i = s.length - 1 - offset; return i >= 0 ? String(s[i]) : "0"; }
  function registers()     { return state.dcState.registers || {}; }

  // ═══════════════════════════════════════════════════════════════════
  //  RENDER
  // ═══════════════════════════════════════════════════════════════════
function render() {
    const app = document.getElementById("app");
    app.innerHTML = "";
    app.appendChild(buildIO());
    app.appendChild(buildToolbar());
    app.appendChild(buildGrid6());
    app.appendChild(buildGrid5());
    detailEl = null;
    if (state.showDetails) { detailEl = buildDetail(); app.appendChild(detailEl); }
  }

  // ── Lightweight refresh (avoids full re-render on every keypress) ────
  function refreshIO() {
    if (ioInputEl) ioInputEl.value = state.input;
  }
  function refreshStackLines() {
    if (tValEl) tValEl.textContent = stackAt(3);
    if (zValEl) zValEl.textContent = stackAt(2);
    if (yValEl) yValEl.textContent = stackAt(1);
  }
  function refreshAfterCalc() {
    refreshIO();
    refreshStackLines();
    if (iokInfoEl) iokInfoEl.innerHTML = `<span><b>i:</b> ${esc(String(cfg("i")))}</span><span><b>o:</b> ${esc(String(cfg("o")))}</span><span><b>k:</b> ${esc(String(cfg("k")))}</span>`;
    if (state.showDetails) {
      const fresh = buildDetail();
      if (detailEl && detailEl.parentNode) detailEl.parentNode.replaceChild(fresh, detailEl);
      else document.getElementById("app").appendChild(fresh);
      detailEl = fresh;
    }
  }

  // ── I/O block ──────────────────────────────────────────────────────
  function buildIO() {
    const wrap = el("div", "io-wrap");

    const tRow = el("div", "stack-line");
    const tLbl = el("span", "stack-lbl"); tLbl.textContent = "T";
    const tVal = el("span", "stack-val"); tVal.textContent = stackAt(3);
    tRow.appendChild(tLbl); tRow.appendChild(tVal);
    wrap.appendChild(tRow);

    const zRow = el("div", "stack-line");
    const zLbl = el("span", "stack-lbl"); zLbl.textContent = "Z";
    const zVal = el("span", "stack-val"); zVal.textContent = stackAt(2);
    zRow.appendChild(zLbl); zRow.appendChild(zVal);
    wrap.appendChild(zRow);

    const yRow = el("div", "stack-line");
    const yLbl = el("span", "stack-lbl"); yLbl.textContent = "Y";
    const yVal = el("span", "stack-val"); yVal.textContent = stackAt(1);
    yRow.appendChild(yLbl); yRow.appendChild(yVal);
    wrap.appendChild(yRow);

    const xRow = el("div", "stack-line stack-line-x");
    const xLbl = el("span", "stack-lbl"); xLbl.textContent = "X";
    xRow.appendChild(xLbl);
    const inp = el("input");
    inp.type = "text"; inp.value = state.input;
    // readOnly suppresses the mobile soft-keyboard when calculator buttons are tapped.
    // It is removed only when the user explicitly taps into the input field.
    inp.readOnly = true;
    inp.addEventListener("focus", () => { inp.readOnly = false; });
    inp.addEventListener("blur",  () => { inp.readOnly = true; });
    inp.addEventListener("input",   e => { state.input = e.target.value; });
    inp.addEventListener("keydown", e => { if (e.key === "Enter") doEnter(); });
    xRow.appendChild(inp);
    wrap.appendChild(xRow);

    ioInputEl = inp;
    tValEl = tVal; zValEl = zVal; yValEl = yVal;
    return wrap;
  }

    const wrap = el("div", "pop-wrap");

    const entries = [

      { label: "CLST",          action: () => { doMacro("c", false); closePopup(); } },
      { label: "\u27F3 Reset",  action: () => { state.dcState={}; state.output=" "; state.lastx="0"; state.input=""; state.sl = true; state.showDetails=false; localStorage.removeItem(STORE_KEY); closePopup(); render(); } },

  // ── Popup builders ──────────────────────────────────────────────────
  function buildPopup(id, entries) {
    const wrap = el("div", "pop-wrap");
    const trigger = btn("util pop-trigger", id);
    trigger.addEventListener("click", e => { e.stopPropagation(); togglePopup(id, trigger); });
    wrap.appendChild(trigger);

    const isOpen = state.openPopup === id;
    const menu = el("div", "pop-menu" + (isOpen ? " open" : ""));
    menu.setAttribute("data-dir", isOpen ? state.popupDir : "above");

    for (const [label, cmd, print] of entries) {
      const b = (print === false) ? mBtn(label, cmd, false) : fBtn(label, cmd, print);
      b.addEventListener("click", closePopup, { capture: true });
      menu.appendChild(b);
    }
    wrap.appendChild(menu);
    return wrap;
  }

  // ── Detail panel ───────────────────────────────────────────────────
  function buildDetail() {
    const panel = el("div", ""); panel.id = "detail"; panel.className = "on";

    const sDiv = el("div");
    const sTable = el("table");
    const sCap = el("caption"); sCap.textContent = `STACK (${stackLen()})`; sTable.appendChild(sCap);
    sTable.innerHTML += `<thead><tr><th style="width:40px">Reg</th><th>Value</th></tr></thead>`;
    const sTbody = el("tbody");
    for (const [i, lbl] of ["X","Y","Z","T"].entries()) {
      const tr = el("tr");
      tr.innerHTML = `<td style="font-weight:bold">${lbl}</td><td class="mono">${esc(stackAt(i))}</td>`;
      sTbody.appendChild(tr);
    }
    const lxTr = el("tr"); lxTr.className = "lx-row";
    lxTr.innerHTML = `<td class="lx-lbl">L-X</td><td class="mono" style="font-weight:bold">${esc(state.lastx)}</td>`;
    sTbody.appendChild(lxTr);
    sTable.appendChild(sTbody);
    sDiv.appendChild(sTable);
    panel.appendChild(sDiv);

    const rDiv = el("div");
    const rTable = el("table");
    const rCap = el("caption"); rCap.textContent = "REGISTERS"; rTable.appendChild(rCap);
    rTable.innerHTML += `<thead><tr><th style="width:55px">Reg</th><th>Frames</th></tr></thead>`;
    const rTbody = el("tbody");
    for (const [name, data] of Object.entries(registers())) {
      const frames = (data?.frames ?? []).slice().reverse();
      let html = "";
      for (const f of frames) {
        html += `<span style="margin-right:10px;display:inline;white-space:normal"><span class="fv">${esc(String(f.v??""))}</span>`;
        const keys = Object.keys(f.array ?? {}).sort((a,b) => +a - +b);
        if (keys.length) html += " \u2192 ";
        for (const k of keys) html += `<span class="ae">[${esc(k)}]: ${esc(String(f.array[k]))}</span>`;
        html += `</span>`;
      }
      const tr = el("tr");
      tr.innerHTML = `<td style="font-weight:bold">${esc(name)}</td><td class="mono" style="line-height:1.3">${html}</td>`;
      rTbody.appendChild(tr);
    }
    rTable.appendChild(rTbody);
    rDiv.appendChild(rTable);
    panel.appendChild(rDiv);
    return panel;
  }

  // ── Button factories ───────────────────────────────────────────────
  function iBtn(char) { const b = btn("ins", char); b.addEventListener("click", () => doIns(char)); return b; }
  // function mBtn(label, cmd, print) { const b = btn("func", label); b.addEventListener("click", () => doMacro(cmd, print)); return b; }
  function mBtn(label, cmd, print, extraClass) { const b = btn("func" + (extraClass ? " " + extraClass : ""), label); b.addEventListener("click", () => doMacro(cmd, print)); return b; }
  function fBtn(label, cmd, print) { const b = btn("func", label); b.addEventListener("click", () => doFunc(cmd, print)); return b; }
  function btn(cls, label) { const b = document.createElement("button"); b.className = cls; b.innerHTML = label; return b; }
  function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
  function esc(s) { return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  // ═══════════════════════════════════════════════════════════════════
  //  DC script constants — verbatim from document 8
  // ═══════════════════════════════════════════════════════════════════
  const LN   = "K s_ l_ 10 + k .6931471805599453094172321214581765680755001343602552 sl sx 0 sn lx sm [lm 2 / sm ln 1 + sn 2 lm >D] sD 2 lm >D [lm 2 / sm ln 1 + sn] sB lm 2 =B [lm 2 * sm ln 1 - sn lm 1 >U] sU lm 1 >U lm 1 - lm 1 + / sy ly st ly sa 1 si [ly ly * lt * st la lt li 2 + / + sa li 2 + si lt 0 !=Z] sZ lZ x la 2 * ln ll * + l_ k 1 /";
  const LG   = "K s_ l_ 10 + k 2.3025850929940456840179914546843642076011 sT .6931471805599453094172321214581765680755001343602552 sl sx 0 sn lx sm [lm 2 / sm ln 1 + sn 2 lm >D] sD 2 lm >D [lm 2 / sm ln 1 + sn] sB lm 2 =B [lm 2 * sm ln 1 - sn lm 1 >U] sU lm 1 >U lm 1 - lm 1 + / sy ly st ly sa 1 si [ly ly * lt * st la lt li 2 + / + sa li 2 + si lt 0 !=Z] sZ lZ x la 2 * ln ll * + l_ k lT /";
