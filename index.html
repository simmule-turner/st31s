<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dc Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --row-gap:          10px;   /* gap used between rows inside grid6/grid5 */
    --label-block:      18px;  /* shift-label-row height (16px) + key-cell gap (2px) */
    --section-gap:      calc(var(--row-gap) + var(--label-block)); /* 28px: matches the
                                   visual gap between button rows, which already includes
                                   the shift-label block under each button */
    --bg:               #f0f0f0;
    --fg:               #000;
    --ins-bg:           #c8c8c8;
    --ins-fg:           #000;
    --func-bg:          #ffffff;
    --func-fg:          #000;
    --btn-border:       #555;
    --panel-bg:         #fff;
    --hdr-bg:           #333;
    --hdr-fg:           #fff;
    --tbl-border:       #bbb;
    --tbl-hdr-bg:       #ddd;
    --display-bg:       #f8f8f8;
    --display-fg:       #000000;
    --input-bg:         #ffffff;
    --input-fg:         #000000;
    --shift-on-bg:      #b8860b;
    --shift-on-fg:      #fff;
    --popup-bg:         #eee;
    --popup-border:     #333;
    --btn-bg:           var(--ins-bg);
    --btn-fg:           var(--ins-fg);

    /* Adjustable typography: tweak these to change button text size/weight everywhere */
    --btn-font-size:    17px;
    --btn-font-weight:  700;
    --base-font-size:   16px;
    --input-font-size:  16px;
    --display-font-size: 16px;
  }

  [data-theme="dark"] {
    --bg:               #1a1a1a;
    --fg:               #e8e8e8;
    --ins-bg:           #3a3a3a;
    --ins-fg:           #e8e8e8;
    --func-bg:          #242424;
    --func-fg:          #e8e8e8;
    --btn-border:       #555;
    --panel-bg:         #242424;
    --hdr-bg:           #111;
    --hdr-fg:           #ccc;
    --tbl-border:       #444;
    --tbl-hdr-bg:       #2f2f2f;
    --display-bg:       #242424;
    --display-fg:       #00ff88;
    --input-bg:         #1e2a1e;
    --input-fg:         #00ff88;
    --shift-on-bg:      #ffd633;
    --shift-on-fg:      #000; 
    --popup-bg:         #2a2a2a;
    --popup-border:     #666;
    --btn-bg:           var(--ins-bg);
    --btn-fg:           var(--ins-fg);
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: system-ui, sans-serif;
    font-size: var(--base-font-size);
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0; margin: 0;
  }

  #app {
    width: 100%; max-width: 480px;
    height: 100vh;
    overflow: hidden;
    padding: 16px; box-sizing: border-box;
    display: flex; flex-direction: column;
    gap: var(--section-gap);
    position: relative;
  }

  .stack-panel {
    border: 2px solid var(--btn-border); background: var(--func-bg); flex-shrink: 0;
    font-family: monospace;
    margin: 0; padding: 0;
  }
  .stack-row {
    display: flex; align-items: center; height: 2.1em;
    padding: 0 8px; border-bottom: 1px solid var(--btn-border);
    background: var(--func-bg);
    color: var(--func-fg); font-size: var(--btn-font-size); font-weight: var(--btn-font-weight);
  }
  .stack-row:last-child { border-bottom: none; }
  .stack-label { width: 1.4em; opacity: 0.65; font-weight: 700; flex-shrink: 0; }
  .stack-value {
    flex: 1; text-align: right; white-space: nowrap; overflow: hidden;
  }
  .stack-row.x-row input {
    flex: 1; text-align: right; background: transparent; border: none; outline: none;
    color: var(--func-fg); font-family: monospace;
    font-size: var(--btn-font-size); font-weight: var(--btn-font-weight); padding: 0;
    user-select: text; -webkit-user-select: text; -moz-user-select: text; -ms-user-select: text;
  }

  button {
    height: 44px;
    border: 2px solid var(--btn-border);
    border-radius: 6px;
    cursor: pointer;
    font-size: var(--btn-font-size);
    font-weight: var(--btn-font-weight);
    display: flex; justify-content: center; align-items: center;
    overflow: hidden; white-space: nowrap;
    width: 100%; padding: 0 4px;
    position: relative;
    user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;    
    background-image: linear-gradient(to bottom, rgba(255,255,255,0.55), rgba(255,255,255,0) 45%, rgba(0,0,0,0.06) 100%);
    box-shadow:
      0 2px 0 rgba(0,0,0,0.35),
      0 3px 4px rgba(0,0,0,0.28),
      inset 0 1px 0 rgba(255,255,255,0.5);
    transform: translateY(0);
    transition: transform 0.06s ease, box-shadow 0.06s ease;
    touch-action: manipulation;
  }

  button:active {
    transform: translateY(2px);
    box-shadow:
      0 0 0 rgba(0,0,0,0.35),
      0 1px 1px rgba(0,0,0,0.25),
      inset 0 1px 2px rgba(0,0,0,0.25);
    background-image: linear-gradient(to bottom, rgba(0,0,0,0.06), rgba(255,255,255,0) 55%, rgba(255,255,255,0.18) 100%);
  }
  button.ins  { background-color: var(--ins-bg);  color: var(--ins-fg); }
  button.func { background-color: var(--func-bg); color: var(--func-fg); }
  button.util { background-color: var(--func-bg); color: var(--fg); }

  button.shift-key {
    background-color: var(--func-bg);
    border: 2px solid var(--btn-border);
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    color:  #a65407;
  }
  button.shift-key svg { 
    width: 70%; 
    height: 70%; 
    display: block;
    fill: currentColor;
  }
  button.shift-key svg path {
    stroke: currentColor;
  }
  button.shift-on {
    background-color: var(--func-bg);
    border: 3px solid;
    transform: none;
  }
  button.sym-fix { -webkit-text-stroke: 1.2px currentColor; }
  .bs-btn { line-height: 1; display: flex; justify-content: center; align-items: center; }
  
  .toolbar {
    display: grid; grid-template-columns: repeat(6, minmax(50px, 1fr));
    gap: var(--row-gap) 4px;
    width: 100%; grid-auto-rows: 40px; // 58 - 18
    flex-shrink: 0;
    margin: 0; padding: 0;
  }
  .tb-left  { display: contents; }
  .tb-right { grid-column: span 3; font-size: 1em; display: flex; justify-content: flex-end; gap: 10px; align-items: center; height: 40px; }
  .iok-info { user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; }
  .theme-btn {
    background-color: var(--func-bg); border: 2px solid var(--btn-border); color: var(--fg);
    width: 28px; height: 24px; cursor: pointer; font-size: 14px;
    display: flex; justify-content: center; align-items: center;
    border-radius: 6px; padding: 0; flex-shrink: 0;
    background-image: linear-gradient(to bottom, rgba(255,255,255,0.55), rgba(255,255,255,0) 45%, rgba(0,0,0,0.06) 100%);
    box-shadow:
      0 1px 0 rgba(0,0,0,0.35),
      0 2px 3px rgba(0,0,0,0.25),
      inset 0 1px 0 rgba(255,255,255,0.5);
  }
  .theme-btn:hover { background-color: var(--tbl-hdr-bg); }
  .theme-btn:active {
    transform: translateY(1px);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
  }

  .grid6 {
    display: grid;
    grid-template-columns: repeat(6, minmax(50px, 1fr));
    gap: var(--row-gap) 4px; width: 100%; grid-auto-rows: 58px;
    flex-shrink: 0;
    margin: 0; padding: 0;
    margin-bottom: calc(var(--row-gap) - var(--section-gap));
  }

  .grid5 {
    display: grid;
    grid-template-columns: repeat(5, minmax(50px, 1fr));
    gap: var(--row-gap) 4px; width: 100%; grid-auto-rows: 58px;
    flex-shrink: 0;
    margin: 0; padding: 0;
  }
  
  .key-cell { display: flex; flex-direction: column; height: 100%; gap: 2px; }
  .key-cell button { flex: 0 0 auto; height: 40px; }
  .key-cell.span2 { grid-column: span 2; }
  .shift-label-row {
    flex: 0 0 auto; height: 16px; line-height: 16px;
    text-align: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    font-size: calc(var(--btn-font-size) * 0.85);
    font-weight: 700;
    color: #a65407;
    user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;

    /* Move down by 2 pixels (adjust as needed) */
    transform: translateY(3px);
  }
  .shift-label-row.menu { text-decoration: underline; }

  .pop-wrap { position: relative; display: inline-block; width: 100%; }

  .pop-menu {
    display: none; position: absolute;
    left: 0; width: 100%; min-width: 140px;
    padding: 0; border: 2px solid var(--popup-border);
    z-index: 1000; background: var(--popup-bg); color: var(--fg);
    max-height: min(260px, 80vh); overflow-y: auto; overflow-x: hidden;
    flex-direction: column;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.35);
  }
  .pop-menu[data-dir="above"] { bottom: 100%; top: auto;  margin-bottom: 4px; margin-top: 0; }
  .pop-menu[data-dir="below"] { top: 100%;   bottom: auto; margin-top: 4px;   margin-bottom: 0; }
  .pop-menu.open { display: flex; }
  .pop-menu button {
    height: 44px; min-height: 44px; flex-shrink: 0;
    width: 100%; margin: 0; padding: 0 8px;
    border: none; border-bottom: 1px solid var(--tbl-border);
    border-radius: 0;
    background: var(--popup-bg); color: var(--fg);
    font-size: var(--btn-font-size);
    font-weight: var(--btn-font-weight);
    display: flex; justify-content: center; align-items: center;
    cursor: pointer; white-space: nowrap; overflow: hidden;
    box-shadow: none;
    background-image: none;
  }
  .pop-menu button:last-child { border-bottom: none; }
  .pop-menu button:hover { background: var(--tbl-hdr-bg); }
  .pop-menu button:active { transform: none; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15); }
  button.pop-trigger { text-decoration: underline; }

  .detail-backdrop {
    position: absolute; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 1999; display: none;
    border-radius: inherit;
  }
  .detail-backdrop.open { display: block; }
  .detail-overlay {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 80%; max-width: 320px; max-height: 60%;
    overflow-y: auto; overflow-x: hidden;
    background: var(--panel-bg); color: var(--fg);
    border: 2px solid var(--btn-border); border-radius: 10px;
    z-index: 2000; padding: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: none;
  }
  .detail-overlay.open { display: block; }
  
  table {
    width: 100%; table-layout: fixed;
    border: 1px solid var(--tbl-border); border-collapse: collapse;
    font-size: 0.95rem; line-height: 1.3;
    background: var(--panel-bg); color: var(--fg);
  }
  caption {
    caption-side: top; text-align: center; padding: 5px;
    background: var(--hdr-bg); color: var(--hdr-fg);
    font-size: 1em; font-weight: bold;
    border: 1px solid #444; border-bottom: none; letter-spacing: 1px;
    position: sticky; top: 0; z-index: 1;
  }
  th { background: var(--tbl-hdr-bg); height: 25px; padding: 4px 5px; text-align: left; border-bottom: 1px solid var(--tbl-border); }
  td { padding: 4px 5px; border-bottom: 1px solid var(--tbl-border); vertical-align: top; word-wrap: break-word; overflow-wrap: break-word; }
  .mono { font-family: monospace; word-break: break-all; }
  .lx-row { background: rgba(0,0,0,.03); border-top: 2px solid var(--tbl-border); }
  .lx-lbl { font-weight: bold; color: var(--fg); }
  .fv     { font-weight: bold; color: var(--fg); }
  .ae     { background: rgba(0,0,0,.05); padding: 0 3px; border-radius: 3px; margin-right: 2px; display: inline; font-size: .9em; }
</style>
</head>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  PWA Setup (Single File Implementation)
// ═══════════════════════════════════════════════════════════════════════
(function initPWA() {
  const manifest = {
    name: "dc Calculator",
    short_name: "dcCalc",
    start_url: window.location.href.split('?')[0],
    display: "standalone",
    background_color: "#f0f0f0",
    theme_color: "#333333",
    icons: [{
      src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzMzMyIvPjx0ZXh0IHg9IjUwIiB5PSI2MCIgZm9udC1zaXplPSI0MCIgZmlsbD0iI2ZmZiIgdGV4dC1hbmNob3I9Im1pZGRsZSI+ZGM8L3RleHQ+PC9zdmc+",
      sizes: "512x512",
      type: "image/svg+xml"
    }]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const manifestUrl = URL.createObjectURL(manifestBlob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = manifestUrl;
  document.head.appendChild(link);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.error('PWA SW failed:', err));
    });
  }
  
})();

// ═══════════════════════════════════════════════════════════════════════
//  DCMath  (version 28 — inlined)
// ═══════════════════════════════════════════════════════════════════════
class DCMath {
  constructor(input, scale = 0) {
    this.digits = []; this.scale = 0; this.sign = 1;
    if (input instanceof DCMath) { this.digits = [...input.digits]; this.scale = input.scale; this.sign = input.sign; return; }
    if (typeof input === "number") {
      this._parseString(input.toString());
      if (scale > this.scale) { this.digits = DCMath._mulMag(this.digits, DCMath._pow10(scale - this.scale)); this.scale = scale; }
      return;
    }
    if (typeof input === "string") this._parseString(input.trim());
  }
  _parseString(str) {
    if (!str) return;
    let neg = false;
    if (str.startsWith("_") || str.startsWith("-")) { neg = true; str = str.slice(1); }
    const dotPos = str.indexOf(".");
    const intStr = dotPos === -1 ? str : str.slice(0, dotPos);
    const fracStr = dotPos === -1 ? "" : str.slice(dotPos + 1);
    this.scale = fracStr.length;
    const combined = (intStr + fracStr).replace(/^0+/, "") || "0";
    if (combined === "0") return;
    this.sign = neg ? -1 : 1;
    this.digits = [];
    for (let i = combined.length; i > 0; i -= 2) this.digits.push(parseInt(combined.substring(Math.max(0, i - 2), i), 10));
    this._trimLeadingZeros();
  }
  isZero()     { return this.digits.length === 0; }
  isNegative() { return this.sign === -1 && !this.isZero(); }
  isPositive() { return this.sign === 1  && !this.isZero(); }
  abs()     { const r = new DCMath(this); r.sign = 1;          return r; }
  negate()  { if (this.isZero()) return new DCMath(this); const r = new DCMath(this); r.sign = -this.sign; return r; }
  compareTo(other) {
    let a, b;
    if (this.scale === other.scale) { a = this; b = other; } else [a, b] = DCMath._alignScales(this, other);
    if (a.isZero() && b.isZero()) return 0;
    if (a.sign !== b.sign) return a.sign > b.sign ? 1 : -1;
    const cmp = DCMath._cmpMag(a.digits, b.digits);
    return a.sign === 1 ? cmp : -cmp;
  }
  equals(other) { return this.compareTo(other) === 0; }
  stripScale() {
    if (this.scale === 0) return new DCMath(this);
    const { q } = DCMath._divmodMag(this.digits, DCMath._pow10(this.scale), 0);
    const res = new DCMath(0); res.digits = q; res.scale = 0; res.sign = q.length ? this.sign : 1;
    return res;
  }
  toString() {
    if (this.isZero()) return this.scale === 0 ? "0" : "." + "0".repeat(this.scale);
    let s = this.digits.slice().reverse().map((d, i) => i === 0 ? d.toString() : d.toString().padStart(2, "0")).join("");
    if (this.scale > 0) {
      while (s.length <= this.scale) s = "0" + s;
      const ip = s.slice(0, s.length - this.scale), fp = s.slice(s.length - this.scale);
      s = (ip === "0" ? "" : ip) + "." + fp;
    } else { s = s || "0"; }
    return this.sign === -1 ? "-" + s : s;
  }
  _trimLeadingZeros() { while (this.digits.length > 0 && this.digits[this.digits.length - 1] === 0) this.digits.pop(); }
  static _alignScales(a, b) {
    const t = Math.max(a.scale, b.scale);
    const aS = new DCMath(a); if (t > a.scale) { aS.digits = DCMath._mulMag(aS.digits, DCMath._pow10(t - a.scale)); aS.scale = t; }
    const bS = new DCMath(b); if (t > b.scale) { bS.digits = DCMath._mulMag(bS.digits, DCMath._pow10(t - b.scale)); bS.scale = t; }
    return [aS, bS];
  }
  static _pow10(n) {
    if (!DCMath._pow10Cache) DCMath._pow10Cache = new Map([[0, Object.freeze([1])]]);
    if (DCMath._pow10Cache.has(n)) return DCMath._pow10Cache.get(n);
    let best = 0;
    if (DCMath._pow10Cache.has(n - 1)) best = n - 1;
    else for (const k of DCMath._pow10Cache.keys()) if (k < n && k > best) best = k;
    let result = [...DCMath._pow10Cache.get(best)];
    for (let i = best; i < n; i++) result = DCMath._mulMagByDigit(result, 10);
    const fr = Object.freeze(result); DCMath._pow10Cache.set(n, fr); return fr;
  }
  static _mulMagByDigit(a, d) {
    if (!a.length || d === 0) return [];
    const r = []; let c = 0;
    for (let i = 0; i < a.length; i++) { const v = a[i] * d + c; r.push(v % 100); c = Math.trunc(v / 100); }
    while (c > 0) { r.push(c % 100); c = Math.trunc(c / 100); }
    return r;
  }
  static _addMag(a, b) {
    const len = Math.max(a.length, b.length); const r = []; let c = 0;
    for (let i = 0; i < len; i++) { const v = (a[i]||0) + (b[i]||0) + c; r.push(v % 100); c = Math.trunc(v / 100); }
    if (c) r.push(c); return r;
  }
  static _subMag(a, b) {
    const r = []; let bw = 0;
    for (let i = 0; i < a.length; i++) { let v = (a[i]||0) - (b[i]||0) - bw; if (v < 0) { v += 100; bw = 1; } else bw = 0; r.push(v); }
    while (r.length > 0 && r[r.length-1] === 0) r.pop(); return r;
  }
  static _mulMag(a, b) {
    if (!a.length || !b.length) return [];
    const r = new Array(a.length + b.length).fill(0);
    for (let i = 0; i < a.length; i++) for (let j = 0; j < b.length; j++) r[i+j] += a[i]*b[j];
    let c = 0;
    for (let i = 0; i < r.length; i++) { const v = r[i]+c; r[i] = v%100; c = Math.trunc(v/100); }
    while (c > 0) { r.push(c%100); c = Math.trunc(c/100); }
    while (r.length > 0 && r[r.length-1] === 0) r.pop(); return r;
  }
  static _cmpMag(a, b) {
    let al = a.length; while (al > 0 && a[al-1] === 0) al--;
    let bl = b.length; while (bl > 0 && b[bl-1] === 0) bl--;
    if (al !== bl) return al < bl ? -1 : 1;
    for (let i = al-1; i >= 0; i--) if (a[i] !== b[i]) return a[i] < b[i] ? -1 : 1;
    return 0;
  }
  static _divmodMag(dividend, divisor, extraScale = 0) {
    if (!divisor.length || (divisor.length === 1 && divisor[0] === 0)) throw new Error("divide by zero");
    let dvd = extraScale > 0 ? DCMath._mulMag(dividend, DCMath._pow10(extraScale)) : [...dividend];
    const dvs = [...divisor];
    while (dvd.length > 0 && dvd[dvd.length-1] === 0) dvd.pop();
    while (dvs.length > 0 && dvs[dvs.length-1] === 0) dvs.pop();
    if (!dvd.length) return { q: [], r: [] };
    const q = []; let rem = [];
    for (let i = dvd.length-1; i >= 0; i--) {
      rem.unshift(dvd[i]); while (rem.length > 0 && rem[rem.length-1] === 0) rem.pop();
      let lo = 0, hi = 99, qd = 0, lp = [];
      while (lo <= hi) { const m = Math.trunc((lo+hi)/2); const p = DCMath._mulMagByDigit(dvs,m); if (DCMath._cmpMag(p,rem)<=0){qd=m;lp=p;lo=m+1;}else hi=m-1; }
      q.push(qd); if (qd > 0) rem = DCMath._subMag(rem, lp);
    }
    q.reverse();
    while (q.length > 0 && q[q.length-1] === 0) q.pop();
    while (rem.length > 0 && rem[rem.length-1] === 0) rem.pop();
    return { q, r: rem };
  }
  static _intSqrt(n) { if (n < 2) return Math.trunc(n); let x = n, y = Math.trunc((x + Math.trunc(n/x))/2); while (y < x) { x = y; y = Math.trunc((x + Math.trunc(n/x))/2); } return x; }
  add(other) {

  function toggleTheme() {
    const next = isDark() ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("dc-theme", next);
    render();
  }
  function isDark() { return document.documentElement.getAttribute("data-theme") === "dark"; }
  initTheme();

  // ── Calculator state ──────────────────────────────────────────────────
  const _p = loadPersistedState();
  const state = {
    input:       "",
    shift:       false,
    shiftBlue:   false,
    output:      _p.output  || "0",
    lastx:       _p.lastx   || "0",
    dcState:     _p.dcState || { stack: ["0","0","0","0"], config: { i: 10, o: 10, k: 0 } },
    liftEnabled: (typeof _p.liftEnabled === "boolean") ? _p.liftEnabled : true,
    openPopup:   null,
    popupDir:    "above",
  };

  // ── Live DOM refs for lightweight updates ────────────────────────────
  let xInputEl = null, tValEl = null, zValEl = null, yValEl = null, iokInfoEl = null;
  
  // ── Engine instance ───────────────────────────────────────────────────
  const engine = new DCEngine({
    DCMath,
    config: new Map(),
    loadState: () => state.dcState,
    saveState: (s) => {
      state.dcState = s;
      persistState({ dcState: s, lastx: state.lastx, output: state.output, liftEnabled: state.liftEnabled });
    },
    log: () => {},
    id: "dc-calculator",
  });

  // ── DC execution helpers ──────────────────────────────────────────────
  function runDC(input) {
    try {
      const result = engine.run(input, false) || " ";
      normalizeStack();
      state.output = result;
      persistState({ dcState: state.dcState, lastx: state.lastx, output: state.output, liftEnabled: state.liftEnabled });
      return result;
    } catch (e) {
      state.output = "Error: " + e.toString();
      return state.output;
    }
  }

  // Keeps the dc engine's real stack fixed at exactly 4 levels (T/Z/Y/X) so the
  // engine and the on-screen stack panel are always perfectly in sync — z,
  // rolldown, and rollup all operate on a genuine 4-element array, never a
  // separate display-only copy. Growing past 4 drops the oldest (T) entry;
  // shrinking below 4 replicates the oldest surviving entry upward (true
  // HP-style T-register replication on drop), falling back to "0" only when
  // the stack is completely empty.
  function normalizeStack() {
    let s = Array.isArray(state.dcState.stack) ? state.dcState.stack.map(String) : [];
    if (s.length > 4) {
      s = s.slice(-4);
    } else if (s.length < 4) {
      const fill = s.length ? s[0] : "0";
      while (s.length < 4) s.unshift(fill);
    }
    state.dcState.stack = s;
  }
  
  function wrapBtnMacro(cmd, print) {
    const cur = state.input.trim();
    let prefix = "";
    if (cur) prefix = (state.liftEnabled ? "" : "R ") + cur + " ";
    const suffix = (print !== false) ? " p" : "";
    return prefix + cmd + suffix + " 1s=";
  }

  function doEnter() {
    if (!state.input.trim()) {
      // Enter with no new input always duplicates the existing X (re-lift), regardless of flag
      state.liftEnabled = false;
      runDC("d p 0s=");
    } else {
      // If lift is disabled (last action was Enter/digit-overwrite), pop the stale X first;
      // otherwise the push itself naturally shifts old X down to Y (lift).
      const prefix = state.liftEnabled ? "" : "R ";
      const wrapped = prefix + state.input.trim() + " d p 0s=";
      state.liftEnabled = false;
      runDC(wrapped);
      state.input = "";
    }
    refreshAfterCalc();
  }
  
  function doIns(char) {
    if (state.liftEnabled) {
      captureLastX();
      runDC("d 0s=");
      state.input = "";
      state.liftEnabled = false;
      refreshAfterCalc();
    }
    state.input += char;
    refreshIO();
  }

  // Classic HP LAST X behavior: overwrites the X register in place with the
  // preserved pre-operation value. This is a REPLACE, not an entry —
  // Y/Z/T are completely untouched and the stack height never changes.
  // Crucially, this must NOT call captureLastX(): doing so would overwrite
  // the LAST X register with the value we just recalled, making LAST X
  // unusable for repeated recalls. Any pending typed entry is discarded,
  // matching real HP behavior where LAST X immediately replaces the display.
  function recallLastX() {
    state.input = "";
    runDC("R " + state.lastx + " p 1s=");
    // A function just altered X, so the next digit typed should lift
    // (push) rather than overwrite, same as any other function key.
    state.liftEnabled = true;
    refreshAfterCalc();
  }
 
  // doMacro and doFunc are currently identical; kept as two names since call
  // sites use them to document intent (built-in dc command vs. multi-token
  // macro script), but both delegate to one implementation to avoid drift.
  function doFunc(cmd, print) {
    captureLastX();
    const wrapped = wrapBtnMacro(cmd, print);
    state.liftEnabled = true;
    runDC(wrapped);
    state.input = ""; refreshAfterCalc();
  }
  function doMacro(cmd, print) { doFunc(cmd, print); }

  function captureLastX() {
    const cur = state.input.trim();
    if (cur) { state.lastx = cur; }
    else {
      const stk = state.dcState.stack || [];
      state.lastx = stk.length ? String(stk[stk.length - 1]) : "0";
    }
    persistState({ dcState: state.dcState, lastx: state.lastx, output: state.output, liftEnabled: state.liftEnabled });
  }

  // ── Popup management ─────────────────────────────────────────────────
  function togglePopup(id, triggerEl) {
    if (state.openPopup === id) {
      state.openPopup = null;
    } else {
      state.openPopup = id;
      if (triggerEl) {
        const rect = triggerEl.getBoundingClientRect();
        const itemCount = {conv: 6, more: 6, stat: 6, clear: 3}[id] ?? 6;
        const estimatedH = itemCount * 44 + 8;
        state.popupDir = rect.top >= estimatedH ? "above" : "below";
      } else {
        state.popupDir = "below";
      }
    }
    render();
  }
  function closePopup() { if (state.openPopup) { state.openPopup = null; render(); } }

  document.addEventListener("click", e => {
    if (state.openPopup && !e.target.closest(".pop-wrap")) closePopup();
  });

  for (const evt of ["copy", "cut", "paste"]) {
    document.addEventListener(evt, e => {
      if (e.target.closest("button") || e.target.closest(".iok-info")) e.preventDefault();
    });
  }

  // ── dc state accessors ────────────────────────────────────────────────
  function cfg(key) { return state.dcState.config?.[key] ?? ""; }

  // offset 0=X,1=Y,2=Z,3=T. state.dcState.stack is always length-4 thanks
  // to normalizeStack(), so this reads the engine's real, current data directly.
  function stackAt(offset) {
    const s = state.dcState.stack || [];
    const i = s.length - 1 - offset;
    return i >= 0 ? String(s[i]) : "0";
  }
  function registers()     { return state.dcState.registers || {}; }

  // ═══════════════════════════════════════════════════════════════════
  //  RENDER
  // ═══════════════════════════════════════════════════════════════════
  function render() {
    const app = document.getElementById("app");
    app.innerHTML = "";
    app.appendChild(buildStackPanel());
    app.appendChild(buildToolbar());
    app.appendChild(buildGrid6());
    app.appendChild(buildGrid5());
    ensureDetailOverlay();
  }

  // ── Lightweight refresh (avoids full re-render on every keypress) ────
  function refreshIO() {
    if (xInputEl) {
      xInputEl.value = state.input || state.output;
      scrollXToEnd(xInputEl);
    }
    if (tValEl) tValEl.textContent = stackAt(3);
    if (zValEl) zValEl.textContent = stackAt(2);
    if (yValEl) yValEl.textContent = stackAt(1);
  }

  function refreshAfterCalc() {
    refreshIO();
    if (iokInfoEl) iokInfoEl.innerHTML = `<span><b>i:</b> ${esc(String(cfg("i")))}</span><span> <b>o:</b> ${esc(String(cfg("o")))}</span><span> <b>k:</b> ${esc(String(cfg("k")))}</span>`;
  }

  // ── Stack panel (T/Z/Y/X) ────────────────────────────────────────────
  function buildStackPanel() {
    const wrap = el("div", "stack-panel");

    const makeRow = (label, offset) => {
      const row = el("div", "stack-row");
      const lbl = el("span", "stack-label"); lbl.textContent = label;
      const val = el("span", "stack-value"); val.textContent = stackAt(offset);
      row.appendChild(lbl); row.appendChild(val);
      wrap.appendChild(row);
      return val;
    };

    tValEl = makeRow("T", 3);
    zValEl = makeRow("Z", 2);
    yValEl = makeRow("Y", 1);

    const xRow = el("div", "stack-row x-row");
    const xLbl = el("span", "stack-label"); xLbl.textContent = "X";
    const xInp = document.createElement("input");
    xInp.type = "text";
    // The displayed number is always the field's actual VALUE (not a
    // placeholder) — placeholders render via a separate browser overlay
    // that does not reliably participate in scroll/overflow positioning,
    // which is why long numbers couldn't be scrolled into view before.
    xInp.value = state.input || state.output;
    xInp.placeholder = "0";

    // readOnly suppresses the mobile soft-keyboard when calculator buttons are tapped.
    // It is removed only when the user explicitly taps into the input field.
    xInp.readOnly = true;
    xInp.addEventListener("focus", () => {
      xInp.readOnly = false;
      if (!state.input) {
        // If nothing has been typed yet, select the whole displayed result
        // so the user can immediately copy it via the system context menu
        // (e.g. long-press > Copy on mobile) without having to drag
        // selection handles across a long number. If they instead start
        // typing, the selected text is naturally replaced as normal.
        xInp.select();
      }
    });
    xInp.addEventListener("blur",  () => { xInp.readOnly = true; refreshIO(); });
    xInp.addEventListener("input",   e => { state.input = e.target.value; });
    xInp.addEventListener("keydown", e => { if (e.key === "Enter") doEnter(); });
    xRow.appendChild(xLbl); xRow.appendChild(xInp);
    wrap.appendChild(xRow);

    xInputEl = xInp;
    scrollXToEnd(xInp);
    return wrap;
  }

  // Forces the input's horizontal scroll position to its right end so the
  // most recently entered / most significant digits of an overflowing
  // number stay visible, instead of the browser defaulting to show the
  // start of the text. This is done directly via scrollLeft rather than
  // relying on dir="rtl" or other CSS tricks, which proved unreliable
  // across Chrome desktop and Android.
  function scrollXToEnd(inputEl) {
    if (!inputEl) return;
    inputEl.scrollLeft = inputEl.scrollWidth;
  }

  // ── Stack/Registers overlay (Last-X + Registers; the live T/Z/Y/X table
  // is intentionally omitted since the stack panel above is always visible) ──
  let detailOverlayEl = null, detailBackdropEl = null;

  function ensureDetailOverlay() {
    const app = document.getElementById("app");
    if (!detailBackdropEl) {
      detailBackdropEl = el("div", "detail-backdrop");
      detailBackdropEl.addEventListener("click", () => {
        detailBackdropEl.classList.remove("open");
        detailOverlayEl.classList.remove("open");
      });
    }
    if (!detailOverlayEl) {
      detailOverlayEl = el("div", "detail-overlay");
    }
    // render() rebuilds #app's children each time (app.innerHTML = ""), which
    // detaches these from the DOM even though the JS references survive —
    // always re-append rather than guarding on detailOverlayEl being truthy.
    app.appendChild(detailBackdropEl);
    app.appendChild(detailOverlayEl);
  }

  function showDetailPopup() {
    ensureDetailOverlay();
    updateDetailContent();
    detailBackdropEl.classList.add("open");
    detailOverlayEl.classList.add("open");
  }
    
  function updateDetailContent() {
    if (!detailOverlayEl) return;
    detailOverlayEl.innerHTML = "";

    const lxTable = el("table");
    lxTable.innerHTML = `<tbody><tr class="lx-row"><td class="lx-lbl" style="width:60px">lastx:</td><td class="mono" style="font-weight:bold">${esc(state.lastx)}</td></tr></tbody>`;
    detailOverlayEl.appendChild(lxTable);

    const rTable = el("table");
    rTable.style.marginTop = "8px";
    rTable.innerHTML += `<thead><tr><th style="width:55px">Reg</th><th>Frames</th></tr></thead>`;

    const rTbody = el("tbody");
    // Sort the register entries alphabetically by the 'name' (the key)
    const sortedRegisters = Object.entries(registers()).sort((a, b) => a[0].localeCompare(b[0]));

    for (const [name, data] of sortedRegisters) {
      const frames = (data?.frames ?? []).slice().reverse();    
      let html = "";
      for (const f of frames) {
        html += `<span style="margin-right:10px;display:inline;white-space:normal"><span class="fv">${esc(String(f.v??""))}</span>`;
        const keys = Object.keys(f.array ?? {}).sort((a,b) => +a - +b);
        if (keys.length) html += " \u2192 ";
        for (const k of keys) html += `<span class="ae">[${esc(k)}]: ${esc(String(f.array[k]))}</span>`;
        html += `</span>`;
      }
      const tr = el("tr");
      tr.innerHTML = `<td style="font-weight:bold">${esc(name)}</td><td class="mono" style="line-height:1.3">${html}</td>`;
      rTbody.appendChild(tr);
    }
    rTable.appendChild(rTbody);
    detailOverlayEl.appendChild(rTable);
  }

  // ── Button factories ───────────────────────────────────────────────
  // Simple single-face button (used inside popup menus / toolbar utility buttons)
  function btn(cls, label) { const b = document.createElement("button"); b.className = cls; b.innerHTML = label; return b; }
  function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
  function esc(s) { return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  // Popup-menu entry buttons (flat list inside an open popup) — single face, reuse existing run helpers
  function fBtnSimple(label, cmd, print) { const b = btn("func", label); b.addEventListener("click", () => doFunc(cmd, print)); return b; }
  // mBtnSimple is currently identical to fBtnSimple; kept as a separate name
  // for call-site clarity (dualPopupKey distinguishes macro vs. func entries).
  function mBtnSimple(label, cmd, print) { return fBtnSimple(label, cmd, print); }
 
  // noAutoClear is set only for the shift toggle key itself, since its job
  // is to SET state.shift — every other key consumes/cancels shift after a
  // single press, matching real HP momentary-shift behavior (press shift,
  // press one key, shift clears — it never stays "locked on").
  function dualBtn(cls, main, shift, wrapExtra, noAutoClear, shiftBlue) {
    const wrap = el("div", "key-cell" + (wrapExtra ? " " + wrapExtra : ""));
    const b = document.createElement("button");
    b.className = cls;
    b.innerHTML = main ? main.label : "";
    b.addEventListener("click", e => {
      if (noAutoClear) { if (main) main.run(b, e); return; }
      const shiftWasOn = state.shift;
      const shiftBlueWasOn = state.shiftBlue;
      
      if (shiftBlueWasOn && shiftBlue) {
        shiftBlue.run(b, e);
      } else if (shiftWasOn && shift) {
        shift.run(b, e);
      } else if (main) {
        main.run(b, e);
      }
      
      if (shiftWasOn || shiftBlueWasOn) {
        state.shift = false;
        state.shiftBlue = false;
        render();
      }
    });
    wrap.appendChild(b);
    
    const isMenu = state.shiftBlue ? (shiftBlue && shiftBlue.menu) : (shift && shift.menu);
    const lbl = el("div", "shift-label-row" + (isMenu ? " menu" : ""));
    if (state.shiftBlue) {
      lbl.innerHTML = shiftBlue ? shiftBlue.label : "";
      lbl.style.color = "#0066cc";
    } else {
      lbl.innerHTML = shift ? shift.label : "";
      lbl.style.color = "";
    }
    wrap.appendChild(lbl);
    return wrap;
  }

  // Run-descriptor helpers
  function runIns(ch)            { return { run: () => doIns(ch) }; }
  function runFunc(cmd, print)   { return { run: () => doFunc(cmd, print) }; }
  // runMacro is currently identical to runFunc (see doMacro/doFunc above);
  // kept as a separate name for call-site clarity, delegating to avoid drift.
  function runMacro(cmd, print)  { return runFunc(cmd, print); }
  function withLabel(label, descriptor) { return Object.assign({ label }, descriptor); }

  // Key cell whose shift slot opens a popup menu. The trigger label sits below
  // the button (underlined, like other shift items); the menu itself is anchored
  // to the button via an inner .pop-wrap so existing popup-positioning logic
  // (rect-based above/below detection) is unaffected by the label underneath.
function dualPopupKey(cls, mainLabel, mainDescr, shiftId, shiftLabel, entries) {
    const wrap = el("div", "key-cell");
    const popWrap = el("div", "pop-wrap");
    const b = document.createElement("button");
    b.className = cls;
    b.innerHTML = mainLabel || "";
    b.addEventListener("click", e => {
      if (state.shift || state.shiftBlue) {
        e.stopPropagation();
        // Opening the menu IS the shifted action — consume shift now so the
        // toolbar shift indicator clears, same as any other shifted key.
        state.shift = false;
        state.shiftBlue = false;
        togglePopup(shiftId, b);
      }
      else if (mainDescr) { mainDescr.run(); }
    });
    popWrap.appendChild(b);

    const isOpen = state.openPopup === shiftId;
    const menu = el("div", "pop-menu" + (isOpen ? " open" : ""));
    menu.setAttribute("data-dir", isOpen ? state.popupDir : "above");
    
    // Sort the entries alphabetically by the label (index 0) before rendering
    const sortedEntries = entries.slice().sort((a, b) => a[0].localeCompare(b[0]));

    for (const entry of sortedEntries) {
      let eb;
      if (typeof entry[1] === "function") {
        eb = btn("func", entry[0]);
        eb.addEventListener("click", entry[1]);
      } else {
        const [label, cmd, print] = entry;
        eb = (print === false) ? mBtnSimple(label, cmd, false) : fBtnSimple(label, cmd, print);
      }      
      
      // If a tooltip string is provided as the 3rd index, apply it to the DOM element
      if (entry[2]) {
        eb.title = entry[2];
      }

      eb.addEventListener("click", closePopup, { capture: true });
      menu.appendChild(eb);
    }
    popWrap.appendChild(menu);
    wrap.appendChild(popWrap);

    const lbl = el("div", "shift-label-row menu");
    lbl.innerHTML = shiftLabel || "";
    wrap.appendChild(lbl);
    return wrap;
  }
